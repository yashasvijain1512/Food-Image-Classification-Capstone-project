version: '3.8'

services:
  food-classifier:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: food-image-classifier
    ports:
      - "8000:8000"
    environment:
      - MODEL_DIR=/app/models
      - IMG_SIZE=224
      - TOP_K=3
    volumes:
      # Mount models directory for development (optional)
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
